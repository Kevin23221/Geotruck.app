{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — Geotruck</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/inscripcion.css' %}">
</head>

<body>
    <div class="card">
        <div class="logo">Geo<span>truck</span></div>
        <p class="subtitle">Crea tu cuenta gratis</p>

        {% if messages %}
        <ul class="messages">
            {% for msg in messages %}
            <li class="{% if msg.tags == 'success' %}success{% endif %}">{{ msg }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            <label>Nombre de usuario</label>
            <input type="text" name="username" placeholder="Ej. camionero_pro" required>

            <label>Correo electrónico</label>
            <input type="email" name="email" placeholder="tu@correo.com" required>

            <label>Contraseña</label>
            <input type="password" name="password1" placeholder="••••••••" required>

            <label>Confirmar contraseña</label>
            <input type="password" name="password2" placeholder="••••••••" required>

            <button type="submit" class="btn">Crear cuenta →</button>
        </form>

        <p class="footer-link">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
        </p>
    </div>
</body>

</html>
