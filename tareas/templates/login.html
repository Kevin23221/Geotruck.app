{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Geotruck</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>
    <div class="card">
        <div class="logo">Geo<span>truck</span></div>
        <p class="subtitle">Ingresa a tu cuenta</p>

        {% if messages %}
        <ul class="messages">
            {% for msg in messages %}<li>{{ msg }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <label>Usuario</label>
            <input type="text" name="username" placeholder="Tu nombre de usuario" required>

            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••" required>

            <button type="submit" class="btn">Iniciar sesión →</button>
        </form>

        <p class="footer-link">
            ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate gratis</a>
        </p>
    </div>
</body>

</html>
